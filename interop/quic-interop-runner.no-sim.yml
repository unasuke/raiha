# Sim-less variant of docker-compose.yml. Drops the ns-3 network
# simulator (martenseemann/quic-network-simulator) which does not
# propagate packets reliably under podman, and puts client + server
# on the same bridge network so QUIC datagrams flow directly.
#
# IMPORTANT: trace.py in the runner hardcodes IP4_CLIENT=193.167.0.100
# and IP4_SERVER=193.167.100.100, so this compose pins the client /
# server containers to those addresses. Without that the pyshark
# filter `ip.src == 193.167.100.100` matches nothing and
# _get_versions returns [].
#
# /logs is a named volume shared between client, server and sim. The
# client and server containers run tcpdump on their own eth0 (see
# interop/run_endpoint.sh) and write trace_node_left.pcap /
# trace_node_right.pcap into the volume; the no-op sim service
# exposes the same /logs so quic-interop-runner's `docker cp sim:/logs/.`
# picks the captures up. SSLKEYLOGFILE / QLOGDIR also share the
# volume — their per-role filenames don't collide.
#
# Use with: COMPOSE_FILE=docker-compose.no-sim.yml docker compose ...

services:
  sim:
    image: alpine:3.20
    container_name: sim
    hostname: sim
    command: ["sh", "-c", "mkdir -p /logs && sleep infinity"]
    volumes:
      - simlogs:/logs
    networks:
      interopnet:

  server:
    image: $SERVER
    container_name: server
    hostname: server
    stdin_open: true
    tty: true
    volumes:
      - $SERVER_WWW:/www:ro
      - $SERVER_DOWNLOADS:/downloads:delegated
      - $CERTS:/certs:ro
      - simlogs:/logs
    environment:
      - CRON=$CRON
      - ROLE=server
      - SERVER_PARAMS=$SERVER_PARAMS
      - SSLKEYLOGFILE=/logs/keys.log
      - QLOGDIR=/logs/qlog/
      - TESTCASE=$TESTCASE_SERVER
      - REQUESTS=$REQUESTS_SERVER
      - PROTOCOLS=$PROTOCOLS_SERVER
    privileged: true
    ulimits:
      memlock: 67108864
    networks:
      interopnet:
        ipv4_address: 193.167.100.100
        aliases:
          - server4
          - server6
          - server46

  client:
    image: $CLIENT
    container_name: client
    hostname: client
    stdin_open: true
    tty: true
    volumes:
      - $CLIENT_WWW:/www:ro
      - $CLIENT_DOWNLOADS:/downloads:delegated
      - $CERTS:/certs:ro
      - simlogs:/logs
    environment:
      - CRON=$CRON
      - ROLE=client
      - CLIENT_PARAMS=$CLIENT_PARAMS
      - SSLKEYLOGFILE=/logs/keys.log
      - QLOGDIR=/logs/qlog/
      - TESTCASE=$TESTCASE_CLIENT
      - REQUESTS=$REQUESTS_CLIENT
      - PROTOCOLS=$PROTOCOLS_CLIENT
    privileged: true
    ulimits:
      memlock: 67108864
    depends_on:
      - server
    networks:
      interopnet:
        ipv4_address: 193.167.0.100

networks:
  interopnet:
    driver: bridge
    ipam:
      config:
        - subnet: 193.167.0.0/16

volumes:
  simlogs:
