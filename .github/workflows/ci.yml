on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1.302.0
        with:
          ruby-version: '4.0'
          bundler-cache: true
      - run: bundle exec rake test:unit

  interop-aioquic:
    name: interop (aioquic, Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1.302.0
        with:
          ruby-version: '4.0'
          bundler-cache: true
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
      - run: bundle exec rake test:interop:aioquic

  interop-quicgo:
    name: interop (quic-go, Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1.302.0
        with:
          ruby-version: '4.0'
          bundler-cache: true
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.23'
          cache-dependency-path: test/support/quicgo/go.sum
      - run: bundle exec rake test:interop:quicgo

  interop-quiche:
    name: interop (quiche, Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1.302.0
        with:
          ruby-version: '4.0'
          bundler-cache: true
      - uses: dtolnay/rust-toolchain@stable
      - name: Clone quiche (for rust-cache key derivation)
        run: git clone --depth 1 https://github.com/cloudflare/quiche.git tmp/quiche
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: tmp/quiche
      - run: bundle exec rake test:interop:quiche test:interop:quiche_http3_client test:interop:quiche_http3_server

  interop-tls-openssl:
    name: interop (TLS, openssl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1.302.0
        with:
          ruby-version: '4.0'
          bundler-cache: true
      - run: bundle exec rake test:interop:openssl

  interop-tls-picotls:
    name: interop (TLS, picotls)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1.302.0
        with:
          ruby-version: '4.0'
          bundler-cache: true
      - name: Install picotls build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libssl-dev
      - name: Cache picotls binary
        id: picotls-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: tmp/picotls/cli
          key: picotls-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
      - run: bundle exec rake test:interop:picotls

  interop-runner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tshark
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - run: git clone --depth 1 https://github.com/quic-interop/quic-interop-runner tmp/quic-interop-runner
      - run: |
          python -m pip install --upgrade pip
          pip install -r tmp/quic-interop-runner/requirements.txt
      - run: |
          python - <<'PY'
          import json, pathlib
          p = pathlib.Path("tmp/quic-interop-runner/implementations_quic.json")
          impls = json.loads(p.read_text())
          impls["raiha"] = {
              "image": "localhost/raiha-interop:latest",
              "url": "https://github.com/unasuke/raiha",
              "role": "both",
          }
          p.write_text(json.dumps(impls, indent=2))
          PY
      - run: cp interop/quic-interop-runner.no-sim.yml tmp/quic-interop-runner/docker-compose.no-sim.yml
      - run: docker build -t localhost/raiha-interop:latest -f interop/Dockerfile .
      - working-directory: tmp/quic-interop-runner
        env:
          COMPOSE_FILE: docker-compose.no-sim.yml
        run: python run.py -c raiha -s raiha -t handshake,retry,http3,transfer,resumption -d
      - if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: quic-interop-runner-logs
          path: tmp/quic-interop-runner/logs_*
          retention-days: 7
